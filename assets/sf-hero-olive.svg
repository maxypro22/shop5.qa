<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23261E"/>
      <stop offset="50%" stop-color="#2E3325"/>
      <stop offset="100%" stop-color="#3A4230"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#8A9469" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#5B6645" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5B6645" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#B98A2F" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B98A2F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9CDB9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9CDB9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9CDB9" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grain" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#F2EFE6" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <rect width="1600" height="900" fill="url(#grain)"/>

  <!-- botanical arcs -->
  <g fill="none" stroke="#C9CDB9" stroke-opacity="0.14" stroke-width="1.5">
    <path d="M1150 980 C 1150 620, 1420 520, 1680 540"/>
    <path d="M1230 980 C 1230 680, 1460 600, 1700 620"/>
    <path d="M-80 360 C 200 340, 420 180, 440 -80"/>
    <path d="M-80 440 C 240 420, 480 240, 510 -80"/>
  </g>

  <!-- leaf silhouettes -->
  <g fill="#5B6645" opacity="0.30">
    <path d="M1340 250 q60 -90 150 -90 q-10 100 -90 130 q-40 14 -60 -40z"/>
    <path d="M1300 330 q-20 -70 30 -120 q40 60 10 110 q-18 28 -40 10z"/>
  </g>
  <g fill="#8A9469" opacity="0.18">
    <path d="M220 700 q80 -110 190 -110 q-14 124 -114 160 q-52 18 -76 -50z"/>
  </g>

  <line x1="200" y1="120" x2="1400" y2="120" stroke="url(#line)" stroke-width="1"/>
  <line x1="200" y1="790" x2="1400" y2="790" stroke="url(#line)" stroke-width="1"/>

  <circle cx="320" cy="200" r="5" fill="#F2EFE6" opacity="0.25"/>
  <circle cx="1180" cy="720" r="4" fill="#F2EFE6" opacity="0.2"/>
  <circle cx="880" cy="140" r="3" fill="#F2EFE6" opacity="0.22"/>

  <rect width="1600" height="900" fill="#23261E" opacity="0.14"/>
</svg>
