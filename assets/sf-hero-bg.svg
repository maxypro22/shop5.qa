<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glowA" cx="78%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#5b4fe8" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="12%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#3525cd" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#3525cd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3525cd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a26"/>
      <stop offset="55%" stop-color="#0e0c33"/>
      <stop offset="100%" stop-color="#151042"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d5ffd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6d5ffd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6d5ffd" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1600" height="640" fill="url(#base)"/>
  <rect width="1600" height="640" fill="url(#glowA)"/>
  <rect width="1600" height="640" fill="url(#glowB)"/>
  <rect width="1600" height="640" fill="url(#dots)"/>

  <!-- flowing ribbons -->
  <path d="M-50 470 C 320 380, 620 560, 980 450 S 1520 320, 1700 410" stroke="url(#ribbon)" stroke-width="2.5" fill="none"/>
  <path d="M-50 520 C 360 440, 680 610, 1040 500 S 1540 380, 1700 460" stroke="url(#ribbon)" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- abstract S-curve echoing the brand mark -->
  <g opacity="0.16" stroke="#8b80ff" fill="none" stroke-linecap="round">
    <path d="M1245 150 h150 a55 55 0 0 1 0 110 h-90 a55 55 0 0 0 0 110 h150" stroke-width="34"/>
  </g>
  <circle cx="1438" cy="128" r="20" fill="#8b80ff" opacity="0.25"/>

  <!-- floating soft shapes -->
  <circle cx="240" cy="150" r="90" fill="#5b4fe8" opacity="0.10"/>
  <circle cx="350" cy="95" r="36" fill="#8b80ff" opacity="0.12"/>
  <circle cx="1100" cy="540" r="120" fill="#3525cd" opacity="0.12"/>
  <circle cx="90" cy="420" r="10" fill="#ffffff" opacity="0.18"/>
  <circle cx="540" cy="120" r="6" fill="#ffffff" opacity="0.22"/>
  <circle cx="1320" cy="470" r="8" fill="#ffffff" opacity="0.16"/>
  <circle cx="880" cy="90" r="5" fill="#ffffff" opacity="0.2"/>

  <!-- subtle vignette for text legibility -->
  <rect width="1600" height="640" fill="#0b0a26" opacity="0.18"/>
</svg>
